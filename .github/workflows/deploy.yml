name: Deploy to Wedos

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/components/**
            **/lib/**
            **/public/**
            **/.github/**
            **/.claude/**
            **/.superpowers/**
            **/.playwright-mcp/**
            **/docker/**
            **/docs/**
            **/temp/cache/**
            **/log/**
            Dockerfile
            docker-compose.yml
            .env.docker
            package.json
            package-lock.json
            tsconfig.json
            next.config.ts
            postcss.config.mjs
            eslint.config.mjs
            CLAUDE.md
            README.md
            config/local.neon
